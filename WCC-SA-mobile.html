<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WCC-SA Mobile</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
        #map {
            height: 100vh;
            width: 100%;
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script>
        var map = L.map('map').setView([37.7749, -122.4194], 10); // Initial view

        // Base layer
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // Adding additional map layers
        // Example: Esri services
        var esriLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            // Additional options if needed
        });
        esriLayer.addTo(map);

        // Add NWS alerts
        function addNwsAlerts() {
            // Fetch NWS data and process it here
        }

        // Add fire data endpoints
        function addFireData() {
            // Fetch fire data and process it here
        }

        // Responsive design handling -- This can include more complex CSS for mobile
        window.addEventListener('resize', function() {
            map.invalidateSize();
        });

        addNwsAlerts();
        addFireData();
    </script>
</body>
</html>
